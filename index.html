<!DOCTYPE html>
<html>
<head>
    <title>My Company</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h6>My Company</h6>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home">
    <h2>Welcome to Our Company</h2>
    <p>We build modern web solutions</p>
    <button onclick="toggleMode()">Toggle Mode</button>
</section>

<section id="about">
    <h2>About Us</h2>
    <p>We are a software company providing IT solutions.</p>
</section>

<section id="services">
    <h2>Services</h2>
    <div class="card">Web Development</div>
    <div class="card">App Development</div>
    <div class="card">UI/UX Design</div>
</section>

<section id="portfolio">
    <h2>Portfolio</h2>
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
</section>

<section id="contact">
    <h2>Contact</h2>
    <form onsubmit="return validateForm()">
        <input type="text" id="name" placeholder="Name"><br>
        <input type="email" id="email" placeholder="Email"><br>
        <button type="submit">Submit</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
